<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Fleet & Revenue 2025 – Executive Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--bg:#0f172a;
--sidebar:#020617;
--card:#111827;
--text:#e5e7eb;
--muted:#9ca3af;
--accent:#3b82f6;
--green:#22c55e;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,system-ui,sans-serif;
background:var(--bg);
color:var(--text);
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:280px;
background:var(--sidebar);
padding:30px;
display:flex;
flex-direction:column;
gap:20px;
border-right:1px solid #1f2937;
}

.sidebar h2{
margin-bottom:10px;
font-size:22px;
}

.sidebar select,
.sidebar button{

padding:16px;
font-size:16px;
border-radius:10px;
border:1px solid #1f2937;
background:#111827;
color:white;
}

.sidebar button{
cursor:pointer;
background:#1f2937;
}

.sidebar button:hover{
background:#374151;
}

/* MAIN */

.main{
flex:1;
padding:40px;
overflow:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

#fullscreenBtn{
padding:12px 20px;
border-radius:10px;
border:none;
background:var(--accent);
color:white;
cursor:pointer;
}

/* KPI */

.kpis{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:20px;
margin-bottom:40px;
}

.kpi{
background:var(--card);
border-radius:16px;
padding:20px;
}

.kpi h3{
color:var(--muted);
margin-bottom:8px;
}

.kpi span{
font-size:28px;
font-weight:700;
}

/* CHART GRID */

.charts{
display:grid;
grid-template-columns:2fr 1fr;
gap:24px;
}

.chart-box{
background:var(--card);
border-radius:18px;
padding:20px;
height:420px;
}

.chart-box.large{
grid-column:span 2;
height:520px;
}

canvas{
width:100% !important;
height:100% !important;
}

/* FULLSCREEN */

body.fullscreen .chart-box{
height:65vh;
}

body.fullscreen .chart-box.large{
height:75vh;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Filtri</h2>

<select id="branchFilter"></select>
<select id="monthFilter"></select>

<button id="resetFilters">Reset filtri</button>

</div>

<div class="main">

<div class="header">
<h1>Fleet & Revenue – Executive Overview</h1>
<button id="fullscreenBtn">Schermo intero</button>
</div>

<div class="kpis">

<div class="kpi"><h3>Flotta media</h3><span id="kpiFlotta">–</span></div>
<div class="kpi"><h3>Rental Days</h3><span id="kpiRental">–</span></div>
<div class="kpi"><h3>Flotta Enilive</h3><span id="kpiEnilive">–</span></div>
<div class="kpi"><h3>Prenotazioni</h3><span id="kpiBookings">–</span></div>
<div class="kpi"><h3>Revenue</h3><span id="kpiRevenue">€0</span></div>
<div class="kpi"><h3>Ancillaries</h3><span id="kpiAncillaries">€0</span></div>

</div>

<div class="charts">

<div class="chart-box large">
<canvas id="revenueTrend"></canvas>
</div>

<div class="chart-box">
<canvas id="fleetTrend"></canvas>
</div>

<div class="chart-box">
<canvas id="rentalTrend"></canvas>
</div>

<div class="chart-box">
<canvas id="revenueByBranch"></canvas>
</div>

<div class="chart-box">
<canvas id="revenueMix"></canvas>
</div>

<div class="chart-box">
<canvas id="avgRevenue"></canvas>
</div>

</div>

</div>

<script>

/* UTIL */

const normalize = v => v?.toString().trim().toLowerCase() || "";
const euro = v => "€ " + Math.round(v).toLocaleString("it-IT");
const monthFromDate = d => new Date(d).toLocaleString("it-IT",{month:"long"});
const ENILIVE_DECEMBER_EXTRA = 149;

/* DATA */

let fleetData=[], rentalData=[], bookingData=[];
let revenueChart, rentalChart, fleetTrendChart;

/* LOAD */

Promise.all([
fetch("Fleet_station2025.json").then(r=>r.json()),
fetch("fleetStation2025.json").then(r=>r.json()),
fetch("Clean booking 2.json").then(r=>r.json())
]).then(([fleet,rental,booking])=>{

fleetData = fleet.Data;
rentalData = rental.Sheet1;
bookingData = booking.Bookings;

initFilters();
updateDashboard();

});

/* FILTRI */

function initFilters(){

const branchMap=new Map();

fleetData.forEach(d=>branchMap.set(
normalize(d["Branch Office"]),
d["Branch Office"]
));

branchFilter.innerHTML =
`<option value="ALL">Tutte le sedi</option>` +
[...branchMap.entries()]
.map(([k,v])=>`<option value="${k}">${v}</option>`)
.join("");

const months=[...new Set(
fleetData.map(d=>normalize(monthFromDate(d.Mese)))
)];

monthFilter.innerHTML =
`<option value="ALL">Tutti i mesi</option>` +
months.map(m=>`<option value="${m}">
${m.charAt(0).toUpperCase()+m.slice(1)}
</option>`).join("");

branchFilter.onchange=updateDashboard;
monthFilter.onchange=updateDashboard;

}

/* RESET */

resetFilters.onclick=()=>{
branchFilter.value="ALL";
monthFilter.value="ALL";
updateDashboard();
};

/* DASHBOARD */

function updateDashboard(){

const branch = branchFilter.value;
const month  = monthFilter.value;

let f=fleetData;

if(branch!=="ALL")
f=f.filter(d=>normalize(d["Branch Office"])===branch);

if(month!=="ALL")
f=f.filter(d=>normalize(monthFromDate(d.Mese))===month);

const byMonth={};

f.forEach(d=>byMonth[d.Mese]=(byMonth[d.Mese]||0)+Number(d.flotta||0));

Object.keys(byMonth).forEach(m=>{
if(normalize(monthFromDate(m))==="dicembre"){
byMonth[m]+=ENILIVE_DECEMBER_EXTRA;
}
});

const flottaVals=Object.values(byMonth);

const flottaMedia =
flottaVals.length
? flottaVals.reduce((a,b)=>a+b,0)/flottaVals.length
: 0;

kpiFlotta.innerText =
flottaVals.length ? Math.round(flottaMedia) : "–";

/* RENTAL */

let r=rentalData;

if(month!=="ALL")
r=r.filter(d=>normalize(d.Mese)===month);

kpiRental.innerText =
r.reduce((s,d)=>s+Number(d["Rental Days"]),0)
.toLocaleString("it-IT");

/* ENILIVE */

kpiEnilive.innerText =
(branch==="ALL" && month==="dicembre")
? ENILIVE_DECEMBER_EXTRA
: "–";

/* BOOKING */

let b=bookingData;

if(branch!=="ALL")
b=b.filter(x=>normalize(x["Branch office"])===branch);

if(month!=="ALL")
b=b.filter(x=>normalize(monthFromDate(x["Check-out"]))===month);

const bookingsCount=b.length;

const revenueTotal=b.reduce(
(s,x)=>s+Number(x.Revenue||0),0
);

const ancillariesTotal=b.reduce(
(s,x)=>s+Number(x["Ancillaries vendute"]||0),0
);

kpiBookings.innerText=bookingsCount;
kpiRevenue.innerText=euro(revenueTotal);
kpiAncillaries.innerText=euro(ancillariesTotal);

renderCharts(branch);

}

/* GRAFICI */

function renderCharts(branch){

const rev={}, count={};

bookingData.forEach(b=>{

const m=normalize(monthFromDate(b["Check-out"]));

if(branch==="ALL" || normalize(b["Branch office"])===branch){

rev[m]=(rev[m]||0)+Number(b.Revenue||0);
count[m]=(count[m]||0)+1;

}

});

revenueChart?.destroy();

revenueChart=new Chart(revenueTrend,{
type:"line",
data:{
labels:Object.keys(rev),
datasets:[
{
label:"Revenue (€)",
data:Object.values(rev),
borderColor:"#3b82f6",
backgroundColor:"rgba(59,130,246,0.2)",
fill:true,
tension:.4
},
{
label:"Prenotazioni",
data:Object.values(count),
borderColor:"#22c55e",
backgroundColor:"rgba(34,197,94,0.2)",
fill:true,
tension:.4
}
]
},
options:{responsive:true,maintainAspectRatio:false}
});

/* altri grafici restano uguali */

}

</script>

</body>
</html>
