<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Fleet & Revenue 2025 – Executive Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f172a;
  --card:#111827;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#3b82f6;
  --green:#22c55e;
}

*{box-sizing:border-box}

body{
  margin:0;
  padding:48px;
  font-family:Inter,system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
}

body.fullscreen{ padding:64px }

h1{font-size:42px;margin-bottom:24px}

#fullscreenBtn{
  margin-bottom:32px;
  padding:14px 22px;
  border-radius:14px;
  background:var(--accent);
  border:none;
  color:#fff;
  font-size:18px;
  cursor:pointer;
}

/* FILTRI */
.filters{
  display:flex;
  gap:20px;
  margin-bottom:48px;
  align-items:center;
}

.filters select{
  min-width:240px;
  padding:20px 24px;
  font-size:18px;
  border-radius:16px;
  background:#020617;
  color:#fff;
  border:1px solid #1f2937;
}

/* RESET FILTRI */
#resetFilters{
  padding:20px 24px;
  font-size:16px;
  border-radius:16px;
  border:none;
  background:#1f2937;
  color:#e5e7eb;
  cursor:pointer;
  transition:.2s;
}

#resetFilters:hover{
  background:#374151;
}

/* KPI */
.kpis{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:28px;
  margin-bottom:64px;
}

.kpi{
  background:var(--card);
  border-radius:22px;
  padding:28px;
  box-shadow:0 20px 40px rgba(0,0,0,.35);
}

.kpi.primary span{font-size:40px}
.kpi.secondary span{font-size:30px}
.kpi h3{color:var(--muted);margin-bottom:10px}
.kpi span{font-weight:700}

/* GRAFICI */
.charts{
  display:grid;
  grid-template-columns:2fr 1fr;
  grid-template-rows:auto auto;
  gap:36px;
}

.chart-box{
  background:var(--card);
  border-radius:26px;
  padding:30px;
  height:460px;
}

.chart-box.small{height:400px}

canvas{width:100%!important;height:100%!important}

.footer{
  margin-top:48px;
  text-align:right;
  color:var(--muted);
}
</style>
</head>

<body>

<h1>Fleet & Revenue – Executive Overview</h1>
<button id="fullscreenBtn">⛶ Schermo intero</button>

<div class="filters">
  <select id="branchFilter"></select>
  <select id="monthFilter"></select>
  <button id="resetFilters">Reset filtri</button>
</div>

<div class="kpis">
  <div class="kpi primary"><h3>Flotta media</h3><span id="kpiFlotta">–</span></div>
  <div class="kpi secondary"><h3>Rental Days</h3><span id="kpiRental">–</span></div>
  <div class="kpi secondary"><h3>Flotta Enilive</h3><span id="kpiEnilive">–</span></div>
  <div class="kpi secondary"><h3>Prenotazioni</h3><span id="kpiBookings">–</span></div>
  <div class="kpi primary"><h3>Revenue</h3><span id="kpiRevenue">€ 0</span></div>
  <div class="kpi primary"><h3>Ancillaries</h3><span id="kpiAncillaries">€ 0</span></div>
</div>

<div class="charts">
  <div class="chart-box"><canvas id="revenueTrend"></canvas></div>
  <div class="chart-box small"><canvas id="fleetTrend"></canvas></div>
  <div class="chart-box small"><canvas id="rentalTrend"></canvas></div>
</div>

<div class="footer">Fonte dati: Fleet / Booking</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

/* ========= UTIL ========= */

const normalize = v => v?.toString().trim().toLowerCase() || "";
const euro = v => "€ " + Math.round(v).toLocaleString("it-IT");
const monthFromDate = d => new Date(d).toLocaleString("it-IT",{month:"long"});
const ENILIVE_DECEMBER_EXTRA = 149;

/* ========= DATA ========= */

let fleetData=[], rentalData=[], bookingData=[];
let revenueChart, rentalChart, fleetTrendChart;

/* ========= LOAD ========= */

Promise.all([
  fetch("Fleet_station2025.json").then(r=>r.json()),
  fetch("fleetStation2025.json").then(r=>r.json()),
  fetch("Clean booking 2.json").then(r=>r.json())
]).then(([fleet,rental,booking])=>{
  fleetData = fleet.Data;
  rentalData = rental.Sheet1;
  bookingData = booking.Bookings;
  initFilters();
  updateDashboard();
});

/* ========= FILTRI ========= */

function initFilters(){

  const branchMap=new Map();
  fleetData.forEach(d=>branchMap.set(normalize(d["Branch Office"]),d["Branch Office"]));

  branchFilter.innerHTML =
    `<option value="ALL">Tutte le sedi</option>` +
    [...branchMap.entries()].map(([k,v])=>`<option value="${k}">${v}</option>`).join("");

  const months=[...new Set(fleetData.map(d=>normalize(monthFromDate(d.Mese))))];

  monthFilter.innerHTML =
    `<option value="ALL">Tutti i mesi</option>` +
    months.map(m=>`<option value="${m}">${m.charAt(0).toUpperCase()+m.slice(1)}</option>`).join("");

  branchFilter.onchange=updateDashboard;
  monthFilter.onchange=updateDashboard;

}

/* RESET FILTRI */

resetFilters.onclick = () => {
  branchFilter.value="ALL";
  monthFilter.value="ALL";
  updateDashboard();
};

/* ========= DASHBOARD ========= */

function updateDashboard(){

  const branch = branchFilter.value;
  const month  = monthFilter.value;

  let f=fleetData;

  if(branch!=="ALL") f=f.filter(d=>normalize(d["Branch Office"])===branch);
  if(month!=="ALL") f=f.filter(d=>normalize(monthFromDate(d.Mese))===month);

  const byMonth={};

  f.forEach(d=>byMonth[d.Mese]=(byMonth[d.Mese]||0)+Number(d.flotta||0));

  Object.keys(byMonth).forEach(m=>{
    if(normalize(monthFromDate(m))==="dicembre"){
      byMonth[m]+=ENILIVE_DECEMBER_EXTRA;
    }
  });

  const flottaVals=Object.values(byMonth);

  const flottaMedia = flottaVals.length
    ? flottaVals.reduce((a,b)=>a+b,0)/flottaVals.length
    : 0;

  kpiFlotta.innerText = flottaVals.length ? Math.round(flottaMedia) : "–";

  let r=rentalData;

  if(month!=="ALL") r=r.filter(d=>normalize(d.Mese)===month);

  kpiRental.innerText =
    r.reduce((s,d)=>s+Number(d["Rental Days"]),0).toLocaleString("it-IT");

  kpiEnilive.innerText =
    (branch==="ALL" && month==="dicembre") ? ENILIVE_DECEMBER_EXTRA : "–";

  let b=bookingData;

  if(branch!=="ALL") b=b.filter(x=>normalize(x["Branch office"])===branch);
  if(month!=="ALL") b=b.filter(x=>normalize(monthFromDate(x["Check-out"]))===month);

  const bookingsCount=b.length;
  const revenueTotal=b.reduce((s,x)=>s+Number(x.Revenue||0),0);
  const ancillariesTotal=b.reduce((s,x)=>s+Number(x["Ancillaries vendute"]||0),0);

  kpiBookings.innerText=bookingsCount;
  kpiRevenue.innerText=euro(revenueTotal);
  kpiAncillaries.innerText=euro(ancillariesTotal);

  renderCharts(branch);

}

/* ========= GRAFICI ========= */

function renderCharts(branch){

  const rev={}, count={};

  bookingData.forEach(b=>{

    const m=normalize(monthFromDate(b["Check-out"]));

    if(branch==="ALL" || normalize(b["Branch office"])===branch){

      rev[m]=(rev[m]||0)+Number(b.Revenue||0);
      count[m]=(count[m]||0)+1;

    }

  });

  revenueChart?.destroy();

  revenueChart=new Chart(revenueTrend,{
    type:"line",
    data:{
      labels:Object.keys(rev),
      datasets:[
        {label:"Revenue (€)",data:Object.values(rev),borderColor:"#3b82f6",yAxisID:"y"},
        {label:"Prenotazioni",data:Object.values(count),borderColor:"#22c55e",yAxisID:"y1"}
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      scales:{
        y:{beginAtZero:true},
        y1:{beginAtZero:true,position:"right",grid:{drawOnChartArea:false}}
      }
    }
  });

}

/* ========= FULLSCREEN ========= */

fullscreenBtn.onclick=async()=>{

  if(!document.fullscreenElement){

    await document.documentElement.requestFullscreen();
    document.body.classList.add("fullscreen");
    fullscreenBtn.innerText="⤫ Esci da schermo intero";

  }else{

    await document.exitFullscreen();
    document.body.classList.remove("fullscreen");
    fullscreenBtn.innerText="⛶ Schermo intero";

  }

};

</script>

</body>
</html>
